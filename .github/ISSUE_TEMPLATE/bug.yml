name: Bug report
description: An implementation bug in doodle-core, the bindings, or tooling.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: >
        Implementation bugs belong here. Spec divergences (from the language or
        engine spec) go on the **discussions** repo as a spec-delta instead.
        Per the Bug Discovery Protocol (workspace `.claude/CLAUDE.md`), a bug
        should also get a failing (expected-fail) test and a
        `discussions/claude-todo.md` entry — a conformance test if the behavior
        is language/engine-observable, otherwise a unit test.
  - type: textarea
    id: what
    attributes:
      label: What's wrong
      description: The symptom, and the wrong behavior vs. what you expected.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: A minimal program or steps. Note the covering test if you added one.
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: Critical = determinism leak, memory unsafety, or wrong evaluation.
      options:
        - critical
        - major
        - minor
    validations:
      required: true
  - type: input
    id: root-cause
    attributes:
      label: Root cause (or "unknown")
      placeholder: unknown
