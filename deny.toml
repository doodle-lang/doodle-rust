# cargo-deny configuration (checked by scripts/hygiene/cargo-deny.sh).
#
# Dependency discipline per implementation-plan AD8: advisories, license
# allowlist, source restrictions, and duplicate-version warnings.

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Conservative allowlist. Workspace crates are MIT (LICENSE at the repo
# root); dependencies must fit the list below.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
