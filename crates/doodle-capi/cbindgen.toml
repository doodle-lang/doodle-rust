# The committed include/doodle.h is regenerated with a pinned cbindgen version
# (0.29.4), enforced by scripts/capi-header.sh and installed by the capi CI job,
# so the "regenerate produces no diff" gate is reproducible. Bump deliberately.
language = "C"
include_guard = "DOODLE_H"
cpp_compat = true
autogen_warning = "/* Auto-generated by cbindgen; regenerate with scripts/capi-header.sh --write. Do not edit by hand. */"
